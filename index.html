<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cine Plus</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-glow bg-glow-primary"></div>
    <div class="bg-glow bg-glow-secondary"></div>

    <header class="topbar">
      <div class="logo">
        <span class="logo-main">Cine</span>
        <span class="logo-accent">Plus</span>
      </div>
      <nav class="nav-links">
        <a href="#" class="active">Inicio</a>
        <a href="#catalogo">Catalogo</a>
        <a href="#minha-lista">Minha Lista</a>
      </nav>
      <label class="search-box" for="searchInput">
        <input
          id="searchInput"
          type="text"
          placeholder="Buscar por titulo ou categoria..."
          autocomplete="off"
        />
      </label>
    </header>

    <main>
      <section id="hero" class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <p class="hero-tag">Destaque da semana</p>
          <h1 id="heroTitle">Carregando catalogo...</h1>
          <p id="heroDescription"></p>
          <div class="hero-meta">
            <span id="heroYear"></span>
            <span id="heroDuration"></span>
            <span id="heroRating"></span>
          </div>
          <div class="hero-actions">
            <button id="heroPlayButton" class="play-button" type="button">Assistir agora</button>
            <button id="heroDetailsButton" class="ghost-button" type="button">Ver detalhes</button>
          </div>
        </div>
        <div class="hero-nav">
          <button id="heroPrevButton" class="icon-button hero-nav-button" type="button" aria-label="Anterior">&lt;</button>
          <div id="heroIndicators" class="hero-indicators"></div>
          <button id="heroNextButton" class="icon-button hero-nav-button" type="button" aria-label="Proximo">></button>
        </div>
      </section>

      <section id="continue-section" class="catalogo">
        <div class="section-head">
          <h2>Continuar assistindo</h2>
          <p>Retome seus videos exatamente de onde parou.</p>
        </div>
        <div id="continueContainer" class="cards-row"></div>
      </section>

      <section id="catalogo" class="catalogo">
        <div class="section-head">
          <h2>Catalogo completo</h2>
          <p>Clique em Assistir para abrir o player proprio.</p>
        </div>
        <div id="catalogContainer" class="cards-row"></div>
        <div id="catalogPagination" class="pagination"></div>
      </section>

      <section id="minha-lista" class="catalogo">
        <div class="section-head">
          <h2>Minha Lista</h2>
          <p>Seus videos salvos ficam aqui.</p>
        </div>
        <div id="myListContainer" class="cards-row"></div>
      </section>

      <section id="detailsPage" class="details-page is-hidden" aria-live="polite">
        <button id="backFromDetailsButton" class="ghost-button" type="button">Voltar</button>
        <div class="details-hero">
          <div class="details-overlay"></div>
          <div class="details-content">
            <p id="detailsCategory" class="details-tag"></p>
            <h2 id="detailsTitle"></h2>
            <p id="detailsDescription"></p>
            <div class="hero-meta">
              <span id="detailsYear"></span>
              <span id="detailsDuration"></span>
              <span id="detailsRating"></span>
            </div>
            <div class="details-actions">
              <button id="detailsPlayButton" class="play-button" type="button">Assistir</button>
              <button id="detailsListButton" class="ghost-button" type="button">Adicionar na Lista</button>
            </div>
          </div>
        </div>

        <div class="details-related">
          <h3>Titulos parecidos</h3>
          <div id="detailsRelatedContainer" class="cards-row"></div>
        </div>
      </section>
    </main>

    <div id="playerModal" class="player-modal" aria-hidden="true">
      <div class="player-dialog" role="dialog" aria-modal="true">
        <button id="closePlayerButton" class="close-player" type="button" aria-label="Fechar">
          X
        </button>
        <h3 id="modalTitle"></h3>
        <p id="modalDescription"></p>
        <p id="modalHint" class="modal-hint is-hidden"></p>
        <div id="playerContainer" class="player-container"></div>
      </div>
    </div>

    <template id="cardTemplate">
      <article class="video-card">
        <div class="thumb-wrap">
          <img class="video-thumb" alt="" loading="lazy" />
          <button class="play-icon card-overlay-play btn btn-danger btn-sm rounded-circle" type="button" aria-label="Assistir">
            >
          </button>
          <div class="progress-bar-wrap">
            <div class="progress-bar"></div>
          </div>
        </div>
        <div class="video-info">
          <p class="video-title"></p>
          <p class="video-meta"></p>
          <div class="card-actions">
            <button class="card-watch-button play-button" type="button">Assistir</button>
            <button class="card-detail-button ghost-button" type="button">Detalhes</button>
            <button class="card-list-button icon-button" type="button" aria-label="Adicionar na lista">+</button>
          </div>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
