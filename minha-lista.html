<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cine Plus - Minha Lista</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="my-list">
    <div class="bg-glow bg-glow-primary"></div>
    <div class="bg-glow bg-glow-secondary"></div>

    <header class="topbar">
      <a class="logo-link" href="index.html" aria-label="Pagina inicial">
        <div class="logo">
          <span class="logo-main">Cine</span>
          <span class="logo-accent">Plus</span>
        </div>
      </a>

      <nav class="nav-links">
        <a href="index.html">Inicio</a>
        <a href="catalogo.html">Catalogo</a>
        <a href="minha-lista.html" class="active">Minha Lista</a>
      </nav>

      <label class="search-box" for="searchInput">
        <input
          id="searchInput"
          type="text"
          placeholder="Buscar na minha lista..."
          autocomplete="off"
        />
      </label>
    </header>

    <main>
      <section class="catalogo">
        <div class="section-head">
          <h2>Minha Lista</h2>
          <p>Seus titulos salvos em um lugar so.</p>
        </div>
        <div id="myListContainer" class="cards-row"></div>
      </section>
    </main>

    <div id="playerModal" class="player-modal" aria-hidden="true">
      <div class="player-dialog" role="dialog" aria-modal="true">
        <button id="closePlayerButton" class="close-player" type="button" aria-label="Fechar">
          X
        </button>
        <h3 id="modalTitle"></h3>
        <p id="modalDescription"></p>
        <p id="modalHint" class="modal-hint is-hidden"></p>
        <div id="playerContainer" class="player-container"></div>
      </div>
    </div>

    <template id="cardTemplate">
      <article class="video-card">
        <div class="thumb-wrap">
          <img class="video-thumb" alt="" loading="lazy" />
          <button
            class="play-icon card-overlay-play btn btn-danger btn-sm rounded-circle"
            type="button"
            aria-label="Assistir"
          >
            >
          </button>
          <div class="progress-bar-wrap">
            <div class="progress-bar"></div>
          </div>
        </div>
        <div class="video-info">
          <p class="video-title"></p>
          <p class="video-meta"></p>
          <div class="card-actions">
            <button class="card-watch-button play-button" type="button">Assistir</button>
            <button class="card-detail-button ghost-button" type="button">Detalhes</button>
            <button
              class="card-list-button icon-button"
              type="button"
              aria-label="Adicionar na lista"
            >
              +
            </button>
          </div>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
