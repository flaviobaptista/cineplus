<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cine Plus - Detalhes</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="details">
    <div class="bg-glow bg-glow-primary"></div>
    <div class="bg-glow bg-glow-secondary"></div>

    <header class="topbar">
      <a class="logo-link" href="index.html" aria-label="Pagina inicial">
        <div class="logo">
          <span class="logo-main">Cine</span>
          <span class="logo-accent">Plus</span>
        </div>
      </a>

      <nav class="nav-links">
        <a href="index.html">Inicio</a>
        <a href="catalogo.html">Catalogo</a>
        <a href="minha-lista.html">Minha Lista</a>
      </nav>

      <a class="ghost-button details-back-link" href="catalogo.html">Voltar ao catalogo</a>
    </header>

    <main>
      <section id="detailsPage" class="details-page" aria-live="polite">
        <div class="details-hero">
          <div class="details-overlay"></div>
          <div class="details-content">
            <p id="detailsCategory" class="details-tag"></p>
            <h2 id="detailsTitle">Carregando...</h2>
            <p id="detailsDescription"></p>
            <div class="hero-meta">
              <span id="detailsYear"></span>
              <span id="detailsDuration"></span>
              <span id="detailsRating"></span>
            </div>
            <div class="details-actions">
              <button id="detailsPlayButton" class="play-button" type="button">Assistir</button>
              <button id="detailsNextEpisodeButton" class="ghost-button is-hidden" type="button">
                Proximo episodio
              </button>
              <button id="detailsListButton" class="ghost-button" type="button">Adicionar na Lista</button>
            </div>
          </div>
        </div>

        <section id="seriesPanel" class="series-panel is-hidden">
          <div class="series-panel-header">
            <h3>Episodios</h3>
            <label class="season-picker">
              <span>Temporada</span>
              <select id="seasonSelect"></select>
            </label>
          </div>
          <div id="episodesContainer" class="episodes-grid"></div>
        </section>

      </section>
    </main>

    <div id="playerModal" class="player-modal" aria-hidden="true">
      <div class="player-dialog" role="dialog" aria-modal="true">
        <button id="closePlayerButton" class="close-player" type="button" aria-label="Fechar">
          X
        </button>
        <h3 id="modalTitle"></h3>
        <p id="modalDescription"></p>
        <p id="modalHint" class="modal-hint is-hidden"></p>
        <div id="playerContainer" class="player-container"></div>
      </div>
    </div>

    <template id="cardTemplate">
      <article class="video-card">
        <div class="thumb-wrap">
          <img class="video-thumb" alt="" loading="lazy" />
          <button
            class="play-icon card-overlay-play btn btn-danger btn-sm rounded-circle"
            type="button"
            aria-label="Assistir"
          >
            >
          </button>
          <div class="progress-bar-wrap">
            <div class="progress-bar"></div>
          </div>
        </div>
        <div class="video-info">
          <p class="video-title"></p>
          <p class="video-meta"></p>
          <div class="card-actions">
            <button class="card-watch-button play-button" type="button">Assistir</button>
            <button class="card-detail-button ghost-button" type="button">Detalhes</button>
            <button
              class="card-list-button icon-button"
              type="button"
              aria-label="Adicionar na lista"
            >
              +
            </button>
          </div>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
